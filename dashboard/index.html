<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerifAI Dashboard</title>
<style>
  * { box-sizing: border-box; }
  
  :root {
    --bg-dark: #0d1117;
    --card-bg: #161b22;
    --border-color: #30363d;
    --accent-yellow: #ffcc00;
    --accent-red: #da291c;
    --text-main: #f0f6fc;
    --text-muted: #8b949e;
  }

  body { 
    margin: 0; 
    background: var(--bg-dark); 
    color: var(--text-main); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
    padding: 24px; 
  }

  .dashboard-container {
    display: grid;
    grid-template-columns: 20% 30% 20% 1fr;
    grid-template-rows: 160px 160px auto;
    gap: 16px;
    height: 90vh;
    max-width: 1600px;
    margin: 0 auto;
  }

  .box {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .box:hover {
    border-color: var(--text-muted);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    transform: translateY(-2px);
  }

  .usage-today { 
    grid-column: 1; grid-row: 1; 
    border: 2px solid var(--accent-yellow);
    box-shadow: 0 0 12px rgba(255, 204, 0, 0.1);
  }

  .usage-today:hover {
    border-color: #ffe066;
    box-shadow: 0 0 25px rgba(255, 204, 0, 0.25);
  }

  .highest-usage { 
    grid-column: 1; grid-row: 2; 
    border: 2px solid var(--accent-red);
    box-shadow: 0 0 12px rgba(218, 41, 28, 0.1);
  }

  .highest-usage:hover {
    border-color: #ff4d3d;
    box-shadow: 0 0 25px rgba(218, 41, 28, 0.25);
  }

  .daily-usage     { grid-column: 2; grid-row: 1 / span 2; }
  .bias-registry   { grid-column: 3; grid-row: 1 / span 2; }
  .verdict-feed    { grid-column: 4; grid-row: 1 / span 3; }
  .trending-claims { grid-column: 1 / span 3; grid-row: 3; }

  h2 { font-size: 14px; color: var(--text-muted); margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
  .big-number { font-size: 52px; color: var(--text-main); font-weight: 800; margin: 5px 0; }

  .scroll-content { flex-grow: 1; background: rgba(0,0,0,0.15); border-radius: 8px; padding: 12px; font-size: 13px; overflow-y: auto; }
  .scroll-content::-webkit-scrollbar { width: 6px; }
  .scroll-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

  .graph-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
    margin-top: 10px;
  }

  .graph-area {
    display: flex;
    flex-grow: 1;
    position: relative;
    height: 180px; 
  }

  .y-axis-container {
    width: 35px;
    position: relative;
    height: 100%;
  }

  .y-label {
    position: absolute;
    right: 8px;
    font-size: 10px;
    color: var(--text-muted);
    transform: translateY(50%);
  }

  .graph-main {
    flex-grow: 1;
    position: relative;
    height: 100%;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 10px;
  }

  .grid-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed rgba(255,255,255,0.08);
    pointer-events: none;
  }

  .bar-group {
    position: relative;
    width: 30px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    z-index: 2;
  }

  .bar {
    width: 80%;
    background: var(--accent-yellow);
    border-radius: 4px 4px 0 0;
    transition: height 0.6s ease;
  }

  .bar-val {
    position: absolute;
    font-size: 10px;
    font-weight: bold;
    color: var(--accent-yellow);
    bottom: calc(var(--h) + 4px);
  }

  .x-axis {
    display: flex;
    justify-content: space-around;
    padding-left: 35px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .bias-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 12px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="dashboard-container">
  <div class="box usage-today">
    <h2>Today's Usage</h2>
    <div id="TODAY-VAL" class="big-number">—</div>
    <div id="CURRENT-DATE" style="color: var(--accent-yellow); font-size: 14px;">Loading...</div>
  </div>

  <div class="box highest-usage">
    <h2>Total Checks</h2>
    <div id="HIGH-VAL" class="big-number">—</div>
    <div style="color: var(--accent-red); font-size: 14px; font-weight: 600;">Lifetime Network Activity</div>
  </div>

  <div class="box daily-usage">
    <h2>Daily Activity</h2>
    <div style="color: var(--text-muted); font-size: 12px;">PAST 7 DAYS</div>
    <div class="graph-wrapper">
      <div class="graph-area">
        <div class="y-axis-container" id="Y-CONTAINER"></div>
        <div class="graph-main" id="G-MAIN"></div>
      </div>
      <div class="x-axis"><span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span></div>
    </div>
  </div>

  <div class="box bias-registry">
    <h2>Bias Registry</h2>
    <div class="scroll-content" id="BIAS-LIST">Loading...</div>
  </div>

  <div class="box verdict-feed">
    <h2>Live Verdict Feed</h2>
    <div id="VERDICT-LIST" class="scroll-content">Loading...</div>
  </div>

  <div class="box trending-claims">
    <h2>Trending Claims</h2>
    <div id="TRENDING-LIST" class="scroll-content">Loading...</div>
  </div>
</div>

<script>
  const BASE_URL = "https://verifai-production-4119.up.railway.app" 

  const RATING_EMOJI = { true: "✅", false: "❌", misleading: "⚠️", unverified: "🔍", needs_context: "ℹ️" };
  const BIAS_COLORS = { left: "#60a5fa", center: "#9ca3af", right: "#f87171", state: "#fbbf24", aggregator: "#a78bfa" };
  const BIAS_REGISTRY = {
    "Rappler": {bias:"left"}, "GMA News": {bias:"center"}, "Inquirer": {bias:"center"}, "Philippine News Agency": {bias:"state"},
    "Business Mirror": {bias:"center"}, "Eagle News": {bias:"right"}, "Google News PH": {bias:"aggregator"}, "ABS-CBN News": {bias:"center"},
    "PhilStar": {bias:"center"}, "Manila Bulletin": {bias:"right"}, "Manila Standard": {bias:"right"}, "One News PH": {bias:"center"},
    "CNN Philippines": {bias:"center"}, "VERA Files": {bias:"left"}
  };

  async function updateDashboard() {
    document.getElementById("CURRENT-DATE").innerText = new Date().toLocaleDateString("en-PH", { year: "numeric", month: "long", day: "numeric" });

    document.getElementById("BIAS-LIST").innerHTML = Object.entries(BIAS_REGISTRY).map(([name, info]) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color);font-size:12px">
        <span style="color:var(--text-main)">${name}</span>
        <span class="bias-badge" style="color:${BIAS_COLORS[info.bias]}; border: 1px solid ${BIAS_COLORS[info.bias]}44; background:${BIAS_COLORS[info.bias]}11">${info.bias}</span>
      </div>`).join("");

    try {
      const feed = await fetch(`${BASE_URL}/dashboard/feed`).then(r => r.json());
      document.getElementById("TODAY-VAL").innerText = feed.total_checks_today ?? "—";
      document.getElementById("HIGH-VAL").innerText  = feed.total_checks_all_time ?? "—";

      if (feed.recent_verdicts?.length) {
        document.getElementById("VERDICT-LIST").innerHTML = feed.recent_verdicts.map(v => `
          <div style="border-bottom:1px solid var(--border-color);padding:10px 0">
            <div style="font-size:11px;font-weight:bold;text-transform:uppercase;color:var(--accent-yellow)">${RATING_EMOJI[v.rating] || "🔍"} ${v.rating.replace("_"," ")}</div>
            <div style="font-size:13px;color:var(--text-main);margin:4px 0;line-height:1.4">${v.claim}</div>
            <div style="font-size:11px;color:var(--text-muted)">${Math.round(v.confidence * 100)}% Confidence • ${v.source_surface}</div>
          </div>`).join("");
      }

      if (feed.trending?.length) {
        document.getElementById("TRENDING-LIST").innerHTML = feed.trending.map((t, i) => `
          <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-color)">
            <span style="color:var(--accent-red);font-weight:bold;min-width:20px">#${i + 1}</span>
            <span style="font-size:13px;color:var(--text-main);flex-grow:1">${t.claim}</span>
            <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;background:rgba(255,255,255,0.05);padding:2px 6px;border-radius:4px">${t.check_count} checks</span>
          </div>`).join("");
      }
    } catch (e) { console.warn("feed error:", e) }

    try {
      const json = await fetch(`${BASE_URL}/dashboard/daily`).then(r => r.json());
      const data = Array.from({ length: 7 }, (_, i) => json.daily?.[String(i)] || 0);
      const yContainer = document.getElementById('Y-CONTAINER');
      const gMain = document.getElementById('G-MAIN');
      
      const maxVal = Math.max(...data);
      const ceiling = maxVal > 8 ? Math.ceil(maxVal * 1.2) : 10;
      
      yContainer.innerHTML = '';
      gMain.innerHTML = '';

      const steps = 5; 
      for (let i = 0; i < steps; i++) {
        const val = Math.round((ceiling / (steps - 1)) * i);
        const bottomPercent = (i / (steps - 1)) * 100;
        
        yContainer.insertAdjacentHTML('beforeend', `<span class="y-label" style="bottom: ${bottomPercent}%">${val}</span>`);
        gMain.insertAdjacentHTML('beforeend', `<div class="grid-line" style="bottom: ${bottomPercent}%"></div>`);
      }

      data.forEach(val => {
        const h = (val / ceiling) * 100;
        gMain.insertAdjacentHTML('beforeend', `
          <div class="bar-group" style="--h: ${h}%">
            <div class="bar-val">${val > 0 ? val : ''}</div>
            <div class="bar" style="height: ${val === 0 ? '4px' : h + '%'}; background: ${val === 0 ? 'rgba(255,255,255,0.03)' : 'var(--accent-yellow)'}"></div>
          </div>`);
      });
    } catch (e) { console.warn("graph error:", e) }
  }

  updateDashboard();
  setInterval(updateDashboard, 30000);
</script>

</body>
</html>
