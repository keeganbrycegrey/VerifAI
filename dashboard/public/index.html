<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Cambria, serif;
  background: #262626;
}
main.container {
  padding: 20px;
}
.top-row, .bottom-row {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}
.box {
  background: white;
  border-radius: 25px;
  padding: 20px;
  box-sizing: border-box;
}
.usage-day { width: 25%; min-width: 150px; }
.weekly-graph { width: 50%; min-width: 300px; }
.bias { width: 25%; min-width: 150px; }
.column { width: 50%; min-height: 300px; min-width: 200px; }

h2 {
  margin: 0 0 10px 0;
  font-size: 18px;
}
.hours_and_minutes {
  font-size: 48px;
  font-weight: bold;
}
.date {
  color: gray;
  font-size: 14px;
}
.graph {
  width: 100%;
  height: 150px;
  background: linear-gradient(to top, #dfe6e9, #ffffff);
  border-radius: 15px;
}
.content {
  height: 100%;
  background: #fafafa;
  border-radius: 15px;
  padding: 10px;
}

.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  overflow-x: auto;
}
.filter {
  background: #2f3640;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
}
.filter.active {
  background: #4cd137;
  color: black;
}
</style>
</head>
<body>
<main class="container">

  <section class="top-row">
    <div class="box usage-day">
      <h2>DAILY USAGE</h2>
      <div class="date">DATE</div>
      <div class="hours_and_minutes">0h 0m</div>
    </div>

    <div class="box weekly-graph">
      <h2>WEEKLY USAGE</h2>
      <div class="graph" aria-label="Weekly usage graph"></div>
    </div>

    <div class="box bias">
      <h2>BIAS REGISTRY</h2>
      <div class="content">No biases recorded</div>
    </div>
  </section>

  <section class="bottom-row">
    <div class="box column">
      <h2>VERDICT FEED</h2>
      <div class="content">No verdicts yet</div>
    </div>

    <div class="box column">
      <h2>TRENDING CLAIMS</h2>
      <div class="content">No claims yet</div>
    </div>
  </section>

</main>
</body>
</html>
