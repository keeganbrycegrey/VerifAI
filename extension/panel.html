<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, Cambria, serif;
      background-color: #121212;
      color: #ffffff;
      overflow: hidden;
    }
    .verifai-panel {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #d1be94;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    .verifai-header {
      background: #d1be94;
      color: #1e1e1e;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .verifai-title   { font-size: 18px; font-weight: 800; }
    .verifai-subtitle { font-size: 10px; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
    .verif-close     { background: none; border: none; font-size: 20px; cursor: pointer; color: #1e1e1e; }
    .verifai-nav {
      display: flex;
      background: #111;
      padding: 0 12px;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    .nav-group { display: flex; gap: 12px; }
    .nav-btn {
      background: none; border: none; color: #888; font-size: 11px;
      cursor: pointer; padding: 12px 0; transition: 0.2s;
      text-transform: uppercase; font-weight: bold;
      border-bottom: 2px solid transparent;
    }
    .nav-btn.active { color: #d1be94; border-bottom: 2px solid #d1be94; }
    .nav-dash { margin-left: auto; font-size: 18px; color: #888; cursor: pointer; text-decoration: none; }
    .nav-dash:hover { color: #d1be94; }
    .tab-content  { padding: 16px; }
    .hidden       { display: none; }
    .verifai-row  { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
    .verifai-label { font-weight: 600; color: #aaa; font-size: 13px; }
    .verifai-value { font-weight: 700; font-size: 13px; color: #d1be94; }
    .verifai-explanation-label { font-size: 11px; font-weight: 700; color: #d1be94; margin: 12px 0 4px; }
    .verifai-explanation-value {
      font-size: 12px;
      line-height: 1.4;
      color: #1e1e1e;
      background: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      max-height: 60px;
      overflow-y: auto;
      word-wrap: break-word;
    }
    .verifai-explanation-value::-webkit-scrollbar { width: 4px; }
    .verifai-explanation-value::-webkit-scrollbar-thumb { background: #d1be94; border-radius: 10px; }
    .verifai-actions { display: flex; gap: 8px; margin-top: 16px; }
    .action-btn {
      flex: 1; background: #333; border: 1px solid #444; color: white;
      padding: 8px; font-size: 10px; border-radius: 4px; cursor: pointer;
      font-weight: bold; text-transform: uppercase;
    }
    .action-btn:hover { background: #444; border-color: #d1be94; }
    .text-true          { color: #4ade80; }
    .text-false         { color: #f87171; }
    .text-misleading    { color: #fb923c; }
    .text-unverified    { color: #94a3b8; }
    .text-needs_context { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="verifai-panel">
    <div class="verifai-header">
      <div>
        <div class="verifai-title">VerifAI</div>
        <div class="verifai-subtitle">Fact Checker</div>
      </div>
      <button class="verif-close" id="verif-close">×</button>
    </div>

    <nav class="verifai-nav">
      <div class="nav-group">
        <button id="btn-checker" class="nav-btn active">Checker</button>
        <button id="btn-history" class="nav-btn">History</button>
      </div>
      <span class="nav-dash" title="Open Dashboard">⊞</span>
    </nav>

    <div id="tab-checker" class="tab-content">
      <div class="verifai-row">
        <span class="verifai-label">Verdict:</span>
        <span id="verif-verdict" class="verifai-value">—</span>
      </div>
      <div class="verifai-row">
        <span class="verifai-label">Confidence:</span>
        <span id="verif-confidence" class="verifai-value">—</span>
      </div>
      <div class="verifai-row">
        <span class="verifai-label">Source:</span>
        <span id="verif-source" class="verifai-value">—</span>
      </div>
      <div class="verifai-explanation-label">EXPLANATION (EN)</div>
      <div id="verif-explanation-en" class="verifai-explanation-value">—</div>
      <div class="verifai-explanation-label">PALIWANAG (TL)</div>
      <div id="verif-explanation-tl" class="verifai-explanation-value">—</div>
      <div class="verifai-actions">
        <button class="action-btn">Copy</button>
        <button class="action-btn">Report</button>
      </div>
    </div>

    <div id="tab-history" class="tab-content hidden">
      <p style="color:#666;font-size:12px">Previous checks will appear here.</p>
    </div>
  </div>

</body>
</html>
